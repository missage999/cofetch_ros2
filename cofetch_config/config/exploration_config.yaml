cofetch_ros2:
  exploration:
    enabled: true
    timeout: 600.0
    frontiers:
      min_frontier_size: 5
      min_distance_to_robot: 0.5
      exploration_gain_weight: 1.0
      distance_cost_weight: 0.5

    map:
      resolution: 0.05
      size: [20.0, 20.0]
      origin: [-10.0, -10.0, 0.0]
      update_frequency: 10.0

    collaboration:
      enabled: true
      task_assignment_strategy: "nearest"
      conflict_resolution: "reassignment"
      shared_map_updates: true